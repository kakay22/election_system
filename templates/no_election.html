<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>No Election Available - HIC eVote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-50 px-4">

    <div class="bg-white border shadow-lg rounded-2xl p-10 text-center max-w-md w-full">

        <!-- ICON -->
        <div class="text-6xl mb-4">📭</div>

        <!-- TITLE -->
        <h1 class="text-2xl font-bold text-gray-800 mb-2">
            No Active Election
        </h1>

        <!-- MESSAGE -->
        <p class="text-gray-600 text-sm mb-6">
            There is currently no active election scheduled.  
            Please check back later or wait for the administration to open voting.
        </p>

        <!-- INFO BOX -->
        <div class="bg-yellow-50 border border-yellow-100 text-yellow-700 text-sm p-4 rounded-lg mb-6">
            ⏳ Elections are managed by the school administration and will appear here once activated.
        </div>

        <!-- BUTTON -->
        <a href="/students/dashboard/"
           class="block bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-semibold">
            Go to Dashboard
        </a>

    </div>

</body>
</html>
