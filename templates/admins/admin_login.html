<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-100 via-blue-100 to-purple-100">

    <!-- ================= CONTAINER ================= -->
    <div class="w-full max-w-md relative">

        <!-- Glow Effect -->
        <div class="absolute inset-0 bg-gradient-to-r from-blue-400 to-indigo-500 blur-2xl opacity-20 rounded-3xl">
        </div>

        <!-- Card -->
        <div class="relative bg-white/80 backdrop-blur-xl p-8 rounded-3xl shadow-2xl border border-white/40">

            <!-- Header -->
            <div class="text-center mb-6">
                <div
                    class="w-14 h-14 mx-auto flex items-center justify-center rounded-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white text-xl shadow-lg">
                    🔐
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mt-3">
                    Admin Login
                </h2>
                <p class="text-sm text-gray-500">
                    Secure access to dashboard
                </p>
            </div>

            <!-- ERRORS -->
            {% if messages %}
            <div class="mb-4 space-y-2">
                {% for message in messages %}
                <div
                    class="flex items-center gap-2 text-sm text-red-600 bg-red-50 border border-red-200 px-4 py-2 rounded-xl">
                    ⚠️ <span>{{ message }}</span>
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <!-- FORM -->
            <form method="POST" class="space-y-5">
                {% csrf_token %}

                <!-- Username -->
                <div>
                    <label class="text-sm text-gray-600">Username</label>
                    <input type="text" name="username" placeholder="Enter username" class="w-full mt-1 px-4 py-2.5 rounded-xl border border-gray-200 
                    focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none transition shadow-sm">
                </div>

                <!-- Password -->
                <div class="relative">
                    <label class="text-sm text-gray-600">Password</label>

                    <input id="password" type="password" name="password" placeholder="Enter password" class="w-full mt-1 px-4 py-2.5 pr-12 rounded-xl border border-gray-200 
                    focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none transition shadow-sm">

                    <!-- Toggle Button -->
                    <button type="button" onclick="togglePassword(this)"
                        class="absolute right-3 top-[38px] text-gray-500 hover:text-gray-700 flex items-center">

                        <span id="eyeIcon" class="material-icons text-[20px]">
                            visibility
                        </span>
                    </button>
                </div>

                <!-- Button -->
                <button id="loginBtn" type="submit" class="w-full py-2.5 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 
    text-white font-semibold shadow-lg hover:shadow-xl hover:scale-[1.02] 
    active:scale-[0.98] transition duration-200 flex items-center justify-center gap-2">

                    <span id="btnText">Login</span>

                    <!-- Spinner -->
                    <svg id="spinner" class="hidden w-5 h-5 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="white" stroke-width="4"></circle>
                        <path class="opacity-75" fill="white" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
                    </svg>
                </button>
            </form>

        </div>
    </div>

    <script>
        function togglePassword(btn) {
            const passwordInput = document.getElementById("password");
            const icon = document.getElementById("eyeIcon");

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                icon.textContent = "visibility_off";
            } else {
                passwordInput.type = "password";
                icon.textContent = "visibility";
            }
        }

        // Loading spinner on submit
        document.querySelector("form").addEventListener("submit", function () {
            const btnText = document.getElementById("btnText");
            const spinner = document.getElementById("spinner");
            const loginBtn = document.getElementById("loginBtn");

            btnText.textContent = "Logging in...";
            spinner.classList.remove("hidden");

            loginBtn.disabled = true;
        });
    </script>

</body>

</html>
