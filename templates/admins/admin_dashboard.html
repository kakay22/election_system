{% extends "admins/admin_base.html" %}

{% block content %}

<div class="space-y-6">

    <!-- HEADER -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-3">
        <h1 class="text-xl md:text-2xl font-bold text-gray-800">
            🧑‍💼 Admin Dashboard
        </h1>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">

        <div class="bg-white p-5 rounded-2xl shadow-sm border">
            <p class="text-gray-500 text-xs">Students</p>
            <h2 class="text-2xl md:text-3xl font-bold">{{ students }}</h2>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border">
            <p class="text-gray-500 text-xs">Candidates</p>
            <h2 class="text-2xl md:text-3xl font-bold">{{ candidates }}</h2>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border">
            <p class="text-gray-500 text-xs">Votes</p>
            <h2 class="text-2xl md:text-3xl font-bold">{{ votes }}</h2>
        </div>

    </div>

    <!-- CHART -->
    <div class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border">

        <h2 class="text-base md:text-lg font-semibold mb-4">
            📊 Candidate Votes
        </h2>

        <!-- Tabs (scrollable on mobile) -->
        <div id="positionTabs"
             class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">

            {% for pos in positions %}
            <button
                class="tabBtn whitespace-nowrap px-4 py-2 rounded-lg bg-gray-100 text-sm"
                data-id="{{ pos.id }}">
                {{ pos.name }}
            </button>
            {% endfor %}
        </div>

        <!-- Chart -->
        <div class="mt-4 h-[300px] md:h-[400px]">
            <canvas id="voteChart"></canvas>
        </div>

    </div>

</div>

<script>
    const chartData = {{ chart_data|safe }};
</script>

<script>
    const ctx = document.getElementById("voteChart");
    let currentChart;

    function renderChart(positionId) {
        const data = chartData[positionId];
        if (!data) return;

        if (currentChart) currentChart.destroy();

        currentChart = new Chart(ctx, {
            type: "bar",
            data: {
                labels: data.labels,
                datasets: [{
                    label: data.name,
                    data: data.votes,
                    borderWidth: 1
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { precision: 0 }
                    }
                }
            }
        });
    }

    const tabs = document.querySelectorAll(".tabBtn");

    tabs.forEach((tab, index) => {
        tab.addEventListener("click", () => {

            tabs.forEach(t => t.classList.remove("bg-indigo-500", "text-white"));
            tab.classList.add("bg-indigo-500", "text-white");

            renderChart(tab.dataset.id);
        });

        if (index === 0) tab.click();
    });
</script>

{% endblock %}
