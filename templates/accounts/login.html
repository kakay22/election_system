<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">

    <h2 class="text-2xl font-bold mb-6 text-center">Student Login</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="student_id" placeholder="Student ID"
               class="w-full p-2 mb-3 border rounded" required>

        <input type="password" name="password" placeholder="Password"
               class="w-full p-2 mb-4 border rounded" required>

        <button class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
            Login
        </button>
    </form>

    <p class="text-sm text-center mt-4">
        No account?
        <a href="/accounts/register/" class="text-blue-600">Register</a>
    </p>

</div>

</body>
</html>
