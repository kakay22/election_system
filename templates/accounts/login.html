<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* ✨ Fade animation */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>

<body class="text-gray-800 flex items-center justify-center">

    <!-- ================= BACKGROUND ================= -->
    <div class="fixed inset-0 -z-20">
        <div class="absolute inset-0 bg-cover bg-center"
            style="background-image: url('{% static 'images/bg.jpg' %}'); transform: scale(1.1);">
        </div>

        <div class="absolute inset-0 bg-gradient-to-br from-slate-900/80 via-slate-900/70 to-slate-800/80"></div>
    </div>

    <!-- ================= ALERT MESSAGE (RESPONSIVE PREMIUM TOAST) ================= -->
    {% if messages %}
    <div id="alertBox" class="fixed z-50 space-y-2 w-full max-w-sm
                        left-1/2 -translate-x-1/2 bottom-5
                        md:left-auto md:translate-x-0 md:right-5 md:top-5 md:bottom-auto">

        {% for message in messages %}
        <div class="relative flex items-start justify-between gap-3 px-4 py-3 rounded-xl shadow-lg
        text-sm fade-in backdrop-blur-sm
        {% if message.tags == 'error' %}
            bg-red-50/95 border border-red-200 text-red-700
        {% elif message.tags == 'success' %}
            bg-green-50/95 border border-green-200 text-green-700
        {% else %}
            bg-blue-50/95 border border-blue-200 text-blue-700
        {% endif %}">

            <!-- Message text -->
            <span class="pr-6 leading-snug">{{ message }}</span>

            <!-- Close button -->
            <button onclick="this.parentElement.remove()"
                class="absolute top-2 right-2 text-gray-500 hover:text-gray-800 transition">
                <span class="material-icons text-sm">close</span>
            </button>

        </div>
        {% endfor %}

    </div>
    {% endif %}

    <!-- ================= LOGIN CARD ================= -->
    <div class="w-full max-w-md mx-auto px-4 fade-in">

        <div class="bg-white/90 backdrop-blur-xl p-8 rounded-3xl shadow-2xl border border-white/20">

            <!-- LOGO -->
            <div class="text-center mb-6">
                <div
                    class="text-white bg-blue-600 w-12 h-12 mx-auto rounded-full flex items-center justify-center font-bold shadow-lg">
                    HIC
                </div>
                <h1 class="mt-3 text-lg font-semibold text-gray-800 tracking-wide">
                    HIC eVote
                </h1>
            </div>

            <!-- TITLE -->
            <h2 class="text-xl font-bold mb-6 text-center text-gray-800">
                Student Login
            </h2>

            <!-- FORM -->
            <form method="POST" class="space-y-5">
                {% csrf_token %}

                <!-- STUDENT ID -->
                <div class="relative">
                    <input type="text" name="student_id" required
                        class="peer w-full px-4 pt-5 pb-2.5 rounded-xl border border-gray-200 bg-white/80
                        focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition placeholder-transparent" placeholder="Student ID">

                    <label class="absolute left-4 top-2 text-xs text-gray-500 transition-all
                        peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-sm
                        peer-placeholder-shown:text-gray-400
                        peer-focus:top-2 peer-focus:text-xs peer-focus:text-blue-600">
                        Student ID
                    </label>
                </div>

                <!-- PASSWORD WITH TOGGLE -->
                <div class="relative">
                    <input id="passwordInput" type="password" name="password" required
                        class="peer w-full px-4 pt-5 pb-2.5 pr-12 rounded-xl border border-gray-200 bg-white/80
                        focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition placeholder-transparent" placeholder="Password">

                    <label class="absolute left-4 top-2 text-xs text-gray-500 transition-all
                        peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-sm
                        peer-placeholder-shown:text-gray-400
                        peer-focus:top-2 peer-focus:text-xs peer-focus:text-blue-600">
                        Password
                    </label>

                    <!-- 👁️ ICON -->
                    <span id="togglePassword"
                        class="material-icons absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 cursor-pointer select-none">
                        visibility
                    </span>
                </div>

                <!-- BUTTON -->
                <button id="loginBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl font-medium shadow-lg transition active:scale-[0.98] flex items-center justify-center gap-2">

                    <span id="btnText">Login</span>

                    <!-- Spinner (hidden by default) -->
                    <span id="btnSpinner" class="material-icons animate-spin hidden text-sm">
                        autorenew
                    </span>

                </button>
            </form>

            <!-- FOOTER -->
            <p class="text-sm text-center mt-5 text-gray-600">
                No account?
                <a href="/accounts/register/" class="text-blue-600 font-medium hover:underline">
                    Register
                </a>
            </p>

        </div>

    </div>

    <!-- ================= PASSWORD TOGGLE SCRIPT ================= -->
    <script>
        const toggle = document.getElementById("togglePassword");
        const password = document.getElementById("passwordInput");

        toggle.addEventListener("click", () => {
            const isHidden = password.type === "password";

            password.type = isHidden ? "text" : "password";
            toggle.textContent = isHidden ? "visibility_off" : "visibility";
        });
    </script>

    <!-- ================= SUBMIT SPINNER ================= -->
    <script>
        const form = document.querySelector("form");
        const loginBtn = document.getElementById("loginBtn");
        const btnText = document.getElementById("btnText");
        const btnSpinner = document.getElementById("btnSpinner");

        form.addEventListener("submit", () => {
            // disable button
            loginBtn.disabled = true;
            loginBtn.classList.add("opacity-70", "cursor-not-allowed");

            // change text
            btnText.textContent = "Logging in...";

            // show spinner
            btnSpinner.classList.remove("hidden");
        });
    </script>

    <!-- ================= AUTO DISMISS ALERTS ================= -->
    <script>
        setTimeout(() => {
            const alertBox = document.getElementById("alertBox");
            if (alertBox) {
                alertBox.style.transition = "0.4s ease";
                alertBox.style.opacity = "0";
                alertBox.style.transform = "translateY(-10px)";
                setTimeout(() => alertBox.remove(), 400);
            }
        }, 4000);
    </script>

</body>

</html>
